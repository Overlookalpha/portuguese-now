<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portuguese Now</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f7fb;
            color:#222;
        }

        header{
            background:#009c3b;
            color:white;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin-left:25px;
            font-weight:bold;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
            background:linear-gradient(135deg,#009c3b,#002776);
            color:white;
        }

        .hero h1{
            font-size:52px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:22px;
            margin-bottom:35px;
        }

        .btn{
            display:inline-block;
            padding:15px 35px;
            background:#ffdf00;
            color:#000;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            font-size:18px;
        }

        footer{
            text-align:center;
            padding:30px;
            background:#002776;
            color:white;
        }
    </style>
</head>

<body>

<header>
    <h2>🇧🇷 Portuguese Now</h2>

    <nav>
        <a href="#">Home</a>
        <a href="#">Courses</a>

<section class="hero">

<footer>

</footer>
